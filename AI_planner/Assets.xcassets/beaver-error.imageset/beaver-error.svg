<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <circle cx="60" cy="50" r="22" fill="#8B4513" stroke="#654321" stroke-width="2"/>
  <!-- Eyes (confused, asymmetric) -->
  <circle cx="52" cy="45" r="4" fill="#000"/>
  <circle cx="68" cy="47" r="4" fill="#000"/>
  <!-- Eye highlights -->
  <circle cx="51" cy="44" r="1.2" fill="#FFF"/>
  <circle cx="67" cy="46" r="1.2" fill="#FFF"/>
  <!-- Sad/confused mouth -->
  <path d="M52 58 Q60 55, 68 58" stroke="#000" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Question mark -->
  <text x="80" y="35" font-size="20" fill="#654321">?</text>
  <!-- Broken log -->
  <g>
    <rect x="50" y="75" width="20" height="4" rx="1" fill="#8B4513" stroke="#654321" stroke-width="1"/>
    <line x1="55" y1="75" x2="55" y2="79" stroke="#654321" stroke-width="1"/>
    <line x1="65" y1="75" x2="65" y2="79" stroke="#654321" stroke-width="1"/>
  </g>
  <!-- Scattered sticks -->
  <rect x="35" y="90" width="15" height="3" rx="1" fill="#8B4513"/>
  <rect x="70" y="85" width="12" height="3" rx="1" fill="#8B4513"/>
</svg>
