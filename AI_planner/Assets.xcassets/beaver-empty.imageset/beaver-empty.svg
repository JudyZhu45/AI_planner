<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sleeping beaver body -->
  <ellipse cx="60" cy="60" rx="30" ry="20" fill="#8B4513" stroke="#654321" stroke-width="2"/>
  <!-- Closed eyes (lines) -->
  <line x1="48" y1="55" x2="54" y2="55" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <line x1="66" y1="55" x2="72" y2="55" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <!-- ZZZ -->
  <text x="85" y="42" font-size="16" fill="#654321" opacity="0.7">Z</text>
  <text x="92" y="32" font-size="12" fill="#654321" opacity="0.4">z</text>
  <text x="96" y="25" font-size="9" fill="#654321" opacity="0.25">z</text>
  <!-- Scattered sticks -->
  <rect x="30" y="75" width="15" height="3" rx="1" fill="#8B4513" transform="rotate(-20 37 76)"/>
  <rect x="55" y="78" width="20" height="3" rx="1" fill="#8B4513" transform="rotate(15 65 79)"/>
  <rect x="75" y="72" width="12" height="3" rx="1" fill="#8B4513" transform="rotate(-30 81 73)"/>
</svg>
