  <circle cx="75" cy="45" r="5" fill="#000"/>
  <!-- Eye highlights -->
  <circle cx="43" cy="43" r="1.5" fill="#FFF"/>
  <circle cx="73" cy="43" r="1.5" fill="#FFF"/>
  <!-- Teeth -->
  <rect x="52" y="55" width="7" height="15" rx="1" fill="#FFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="61" y="55" width="7" height="15" rx="1" fill="#FFF" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Tail lines -->
  <g transform="translate(60, 85)">
    <line x1="-2" y1="0" x2="-2" y2="8" stroke="#654321" stroke-width="2"/>
    <line x1="2" y1="0" x2="2" y2="8" stroke="#654321" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="10" stroke="#654321" stroke-width="2"/>
    <!-- Water waves -->
    <path d="M-15 15 Q-10 12, -5 15 T 5 15 T 15 15" stroke="#4A90E2" stroke-width="2" fill="none"/>
    <path d="M-15 20 Q-10 17, -5 20 T 5 20 T 15 20" stroke="#4A90E2" stroke-width="2" fill="none" opacity="0.6"/>
  </g>
</svg>
