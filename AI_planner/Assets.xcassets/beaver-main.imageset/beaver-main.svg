<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <path d="M60 20 C35 20, 25 35, 25 50 C25 65, 35 75, 60 75 C85 75, 95 65, 95 50 C95 35, 85 20, 60 20 Z" fill="#8B4513" stroke="#654321" stroke-width="2"/>
  <!-- Eyes -->
