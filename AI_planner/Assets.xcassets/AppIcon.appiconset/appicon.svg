<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="#F7F4EE"/>
  <!-- Warm gradient overlay -->
  <rect width="1024" height="1024" rx="224" fill="url(#bgGrad)" opacity="0.3"/>
  <!-- Beaver head (scaled from 120x120 to fit ~600px centered) -->
  <g transform="translate(212, 160) scale(5)">
    <!-- Head -->
    <path d="M60 20 C35 20, 25 35, 25 50 C25 65, 35 75, 60 75 C85 75, 95 65, 95 50 C95 35, 85 20, 60 20 Z" fill="#8B4513" stroke="#654321" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="45" cy="45" r="5" fill="#000"/>
    <circle cx="75" cy="45" r="5" fill="#000"/>
    <!-- Eye highlights -->
    <circle cx="43" cy="43" r="1.8" fill="#FFF"/>
    <circle cx="73" cy="43" r="1.8" fill="#FFF"/>
    <!-- Teeth -->
    <rect x="52" y="55" width="7" height="15" rx="1" fill="#FFF" stroke="#E0E0E0" stroke-width="1"/>
    <rect x="61" y="55" width="7" height="15" rx="1" fill="#FFF" stroke="#E0E0E0" stroke-width="1"/>
    <!-- Tail/body lines -->
    <g transform="translate(60, 85)">
      <line x1="-2" y1="0" x2="-2" y2="8" stroke="#654321" stroke-width="2"/>
      <line x1="2" y1="0" x2="2" y2="8" stroke="#654321" stroke-width="2"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="#654321" stroke-width="2"/>
      <!-- Water waves -->
      <path d="M-15 15 Q-10 12, -5 15 T 5 15 T 15 15" stroke="#4A90E2" stroke-width="2" fill="none"/>
      <path d="M-15 20 Q-10 17, -5 20 T 5 20 T 15 20" stroke="#4A90E2" stroke-width="2" fill="none" opacity="0.6"/>
    </g>
  </g>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1024" y2="1024">
      <stop offset="0%" stop-color="#8B4513" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4A90E2" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
</svg>
